<nz-modal
  (nzOnCancel)="closeModal()"
  [nzFooter]="footerTemplate"
  [nzVisible]="isVisible"
  nzTitle="Process review"
  nzWidth="800px"
>
  <ng-container *nzModalContent>
    <div class="flex flex-col gap-4">
      <div class="rounded border border-slate-200 bg-slate-50 p-3 text-sm">
        <div class="font-semibold">Prompt</div>
        <div>{{ selectedPromptPath }}</div>
      </div>

      <div class="flex flex-row gap-4">
        <div class="w-1/4">
          <label class="mb-1 block text-sm font-medium">OpenAI server</label>

          <nz-select
            (ngModelChange)="handleOpenaiServerChange($event)"
            [ngModel]="selectedOpenaiServer"
            class="w-full"
            nzPlaceHolder="Select target server"
          >
            @for (server of openaiServerOptions; track server.id) {
              <nz-option [nzLabel]="server.label" [nzValue]="server.id"></nz-option>
            }
          </nz-select>
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium">Analysis mode</label>

          <nz-radio-group [(ngModel)]="analysisMode">
            <label nz-radio-button nzValue="one_shot">One-shot</label>
            <label nz-radio-button nzValue="chain_of_thought">Thinking</label>
          </nz-radio-group>
        </div>

        <div class="flex-1">
          <label class="mb-1 block text-sm font-medium">Model</label>

          <input
            (ngModelChange)="handleModelChange($event)"
            [disabled]="!selectedOpenaiServer"
            [ngModel]="reviewModel"
            [nzAutocomplete]="modelAuto"
            nz-input
            placeholder="Model name"
          />
          <nz-autocomplete #modelAuto>
            @for (model of filteredModelOptions; track model) {
              <nz-auto-option [nzValue]="model">{{ model }}</nz-auto-option>
            }
          </nz-autocomplete>
        </div>
      </div>

      <div>
        <div class="mb-1 flex items-center justify-between">
          <label class="block text-sm font-medium">Sources</label>
          <div class="text-xs text-slate-500">Selected: {{ selectedSourcesCount }}</div>
        </div>

        <nz-spin [nzSpinning]="isSourceOptionsLoading" nzTip="Loading sources...">
          <div class="max-h-[40vh] overflow-auto rounded border border-slate-200 p-2">
            @if (isVisible) {
              <app-source-tree-selector
                (errorChange)="handleSourceError($event)"
                (leafSelectionChange)="handleLeafSelectionChange($event)"
                (loadingChange)="handleSourceLoadingChange($event)"
                (selectedKeysChange)="handleSourceKeysChange($event)"
                [mode]="'multiple'"
                [selectedKeys]="selectedSourceKeys"
                [showTags]="true"
              />
            }
          </div>
        </nz-spin>
      </div>

      @if (reviewSubmitError) {
        <div nz-typography nzType="danger">{{ reviewSubmitError }}</div>
      }
    </div>
  </ng-container>
</nz-modal>

<ng-template #footerTemplate>
  <app-submit-footer
    (cancel)="closeModal()"
    (submit)="handleSubmit()"
    [isDisabled]="!canSubmitBulkReview"
    [isSubmitting]="isSubmittingReview"
  ></app-submit-footer>
</ng-template>
